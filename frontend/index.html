<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to Google Fonts CDN — eliminates DNS+TLS latency (~100-300ms) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts non-render-blocking (was CSS @import which blocks render) -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800;900&display=swap" /></noscript>
    <title>MDCAT LMS — Courses, MCQs & Performance</title>
    <meta
      name="description"
      content="MDCAT LMS: learn with structured courses, practice MCQs, and track performance with modern analytics."
    />
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph / Link Previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MDCAT LMS" />
    <meta property="og:title" content="MDCAT LMS — Courses, MCQs & Performance" />
    <meta
      property="og:description"
      content="Learn with structured courses, practice MCQs, and track your performance with modern analytics."
    />
    <meta property="og:url" content="https://mdcat-lms.vercel.app/" />
    <meta property="og:image" content="https://mdcat-lms.vercel.app/og.png?v=1" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MDCAT LMS — Courses, MCQs & Performance" />
    <meta
      name="twitter:description"
      content="Learn with structured courses, practice MCQs, and track your performance with modern analytics."
    />
    <meta name="twitter:image" content="https://mdcat-lms.vercel.app/og.png?v=1" />

    <link rel="canonical" href="https://mdcat-lms.vercel.app/" />
    <script>
      ;(() => {
        try {
          const saved = localStorage.getItem('mdcat-theme') || 'light'
          document.documentElement.setAttribute('data-theme', saved === 'dark' ? 'dark' : 'light')
        } catch {
          document.documentElement.setAttribute('data-theme', 'light')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
