<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="55%" stop-color="#fae8ff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="55%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#3b82f6" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="0" stdDeviation="26" flood-color="#8b5cf6" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="200" cy="120" r="220" fill="#60a5fa" opacity="0.12"/>
  <circle cx="1030" cy="540" r="260" fill="#c084fc" opacity="0.14"/>
  <circle cx="1020" cy="120" r="180" fill="#f472b6" opacity="0.10"/>

  <g filter="url(#shadow)">
    <rect x="90" y="110" width="1020" height="410" rx="28" fill="rgba(255,255,255,0.72)" stroke="rgba(255,255,255,0.85)"/>
  </g>

  <g transform="translate(140,165)">
    <g filter="url(#glow)">
      <rect x="0" y="0" width="70" height="70" rx="18" fill="url(#brand)"/>
    </g>
    <text x="92" y="48" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="34" font-weight="800" fill="#0f172a">
      MDCAT LMS
    </text>

    <text x="0" y="132" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="54" font-weight="900" fill="#0f172a">
      Study smarter. Track progress.
    </text>
    <text x="0" y="192" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="54" font-weight="900" fill="#0f172a">
      Master your syllabus.
    </text>

    <text x="0" y="252" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="22" font-weight="600" fill="#475569">
      Courses • MCQs • Live Sessions • Performance Analytics
    </text>

    <g transform="translate(0,292)">
      <rect x="0" y="0" width="320" height="58" rx="18" fill="url(#brand)"/>
      <text x="28" y="38" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="20" font-weight="800" fill="#ffffff">
        Open Demo on Vercel
      </text>

      <rect x="340" y="0" width="460" height="58" rx="18" fill="rgba(15,23,42,0.04)" stroke="rgba(15,23,42,0.08)"/>
      <text x="368" y="38" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="18" font-weight="700" fill="#0f172a">
        mdcat-lms.vercel.app
      </text>
    </g>
  </g>
</svg>

